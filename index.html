<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Em Manutenção 🌴</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
      overflow: hidden;

      /* Fundo praiano animado */
      background: linear-gradient(-45deg, #00c6ff, #0072ff, #00ffcc, #f9d423);
      background-size: 400% 400%;
      animation: gradientOcean 12s ease infinite;
    }

    @keyframes gradientOcean {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      max-width: 500px;
      box-shadow: 0 0 40px rgba(0,0,0,0.2);
      animation: fadeUp 1.5s ease;
    }

    h1 {
      font-size: 2.8em;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.1em;
      margin-bottom: 25px;
    }

    /* Ondinhas animadas */
    .wave {
      position: absolute;
      bottom: 0;
      width: 200%;
      height: 120px;
      background: rgba(255,255,255,0.2);
      border-radius: 100%;
      animation: waveMove 8s linear infinite;
    }

    .wave:nth-child(2) {
      bottom: 10px;
      opacity: 0.5;
      animation-duration: 10s;
    }

    @keyframes waveMove {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Loader estilo sol */
    .sun {
      width: 70px;
      height: 70px;
      background: radial-gradient(circle, #FFD700, #FFA500);
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: pulseSun 2s infinite;
    }

    @keyframes pulseSun {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: linear-gradient(45deg, #ff9966, #ff5e62);
      border-radius: 30px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 94, 98, 0.7);
    }

    .footer {
      margin-top: 20px;
      font-size: 0.9em;
      opacity: 0.8;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

  <div class="container">
    <div class="sun"></div>

    <h1>🌴 Estamos em manutenção</h1>
    <p>Estamos preparando algo incrível, com aquele clima de praia que você gosta... 🌊☀️<br>
    Volte em breve!</p>

    <a href="#" class="btn">Atualizar</a>

    <div class="footer">
      Feito com vibe tropical 🏝️
    </div>
  </div>

  <!-- Ondas -->
  <div class="wave"></div>
  <div class="wave"></div>

</body>
</html>
